name: Deploy HerShield to AWS

# 1. This tells GitHub to run this script ONLY when you push to the 'main' branch
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    # 2. This securely logs into your EC2 server using your secrets
    - name: Deploy via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        # 3. These are the exact commands it types into your server terminal
        script: |
          cd ~/ShieldHub
          git pull origin main
          cd Backend
          sudo docker compose down
          sudo docker compose build --no-cache
          sudo docker compose up -d
          sudo docker image prune -f