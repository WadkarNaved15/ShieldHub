apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"
apply plugin: "com.google.gms.google-services"

    

react {
    // Autolinking of RN packages
    autolinkLibrariesWithApp()
}

// 🟢 Enable Proguard for release builds only if needed
def enableProguardInReleaseBuilds = false

// 🟢 Choose JavaScript engine: Hermes or JSC
def jscFlavor = 'org.webkit:android-jsc:+'

// 🔧 Android configuration
android {
    namespace "com.hershield"
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    def googleMapsApiKey = project.hasProperty("GOOGLE_MAPS_API_KEY") ? project.GOOGLE_MAPS_API_KEY : ""

    defaultConfig {
        applicationId "com.hershield"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0"

        manifestPlaceholders = [
            GOOGLE_MAPS_API_KEY: googleMapsApiKey
        ]
    }

    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            signingConfig signingConfigs.debug
            minifyEnabled enableProguardInReleaseBuilds
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
        }
    }
}

// 📦 Dependencies
dependencies {
    // React Native core (managed by RN plugin)
    implementation("com.facebook.react:react-android")
    implementation "org.jetbrains.kotlin:kotlin-stdlib:$kotlinVersion"


    // 🔥 Firebase BOM (manages compatible versions automatically)
    implementation(platform("com.google.firebase:firebase-bom:33.10.0"))

    // Add Firebase modules (add more as needed)
    implementation("com.google.firebase:firebase-auth")
    implementation("com.google.firebase:firebase-database")
    implementation("com.google.firebase:firebase-messaging")

    // 🧠 JS engine
    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }
}
