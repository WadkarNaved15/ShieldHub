version: '3.8'

services:
  caddy:
    image: caddy:latest
    container_name: hershield-caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - node-api

  ml-engine:
    build: ./ML
    container_name: hershield-ml
    ports:
      - "5001:5001" 
    restart: always
    env_file:          
      - .env           

  node-api:
    build: .
    container_name: hershield-node
    # Port 3000 is intentionally unmapped here so it isn't exposed to HTTP.
    # Caddy will still route to it internally on port 3000.
    depends_on:
      - ml-engine
    env_file:
      - .env  
    environment:
      - ML_API_URL=http://ml-engine:5001
    restart: always

volumes:
  caddy_data:
  caddy_config: